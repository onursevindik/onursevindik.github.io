name: Update Photos

on:
  push:
    paths:
      - 'photos/**'

jobs:
  update-photos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate photos.json
        run: |
          echo '{"photos":[' > photos.json
          first=true
          for f in photos/*.{jpg,JPG,jpeg,JPEG,png,PNG,webp,WEBP}; do
            [ -f "$f" ] || continue
            filename=$(basename "$f")
            if [ "$first" = true ]; then
              echo "\"$filename\"" >> photos.json
              first=false
            else
              echo ",\"$filename\"" >> photos.json
            fi
          done
          echo ']}' >> photos.json

      - name: Commit photos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add photos.json
          git diff --staged --quiet || git commit -m "Update photos.json"
          git push
